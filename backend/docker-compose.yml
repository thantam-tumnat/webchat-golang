services:
  postgres:
    image: postgres:16-alpine
    container_name: chatapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: chatapp
      POSTGRES_DB: chatapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Adminer = หน้าเว็บจัดการ database (ดู/แก้ข้อมูลในตารางได้)
  adminer:
    image: adminer:latest
    container_name: chatapp_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
